services:
  db:
    image: postgres:16-alpine
    container_name: speakielts-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: speakielts_ai
    ports:
      - "5432:5432"
    volumes:
      - speakielts_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d speakielts_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  speakielts_postgres_data:
