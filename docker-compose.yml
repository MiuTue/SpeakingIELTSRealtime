services:
  db:
    image: postgres:16-alpine
    container_name: speakielts-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: speakielts_ai
    ports:
      - "5432:5432"
    volumes:
      - speakielts_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d speakielts_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speakielts-ai-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/speakielts_ai
      BETTER_AUTH_SECRET: replace-with-at-least-32-random-characters
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUDIO_STORAGE_DIR: .data/audio
      AUDIO_UPLOAD_SECRET: replace-with-at-least-32-random-characters
    volumes:
      - speakielts_audio_data:/app/.data/audio

volumes:
  speakielts_postgres_data:
  speakielts_audio_data:
